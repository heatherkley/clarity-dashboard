name: Update Clarity Dashboard

on:
  # Run every day at 7am UTC so trend charts accumulate daily data points
  schedule:
    - cron: "0 7 * * *"
  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests PyJWT cryptography weasyprint google-auth

      - name: Run dashboard generator
        env:
          # Full config.json contents — paste yours into this GitHub Secret
          CONFIG_JSON: ${{ secrets.CONFIG_JSON }}
          # ASC private key contents (.p8 file) for each Apple Developer account
          ASC_KEY_SHIFT: ${{ secrets.ASC_KEY_SHIFT }}
          ASC_KEY_TODAYS_FRONT_PAGES: ${{ secrets.ASC_KEY_TODAYS_FRONT_PAGES }}
          ASC_KEY_P3: ${{ secrets.ASC_KEY_P3 }}
          # Google Play service account JSON (for Android download stats via GCS)
          GOOGLE_PLAY_KEY_JSON: ${{ secrets.GOOGLE_PLAY_KEY_JSON }}
          # Amplitude secret keys for daily registration charts
          AMPLITUDE_SECRET_P3: ${{ secrets.AMPLITUDE_SECRET_P3 }}
        run: |
          python clarity_dashboard.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add clarity_dashboard.html
          # Persist ASC request ID cache and accumulated trend history
          git add .asc_cache.json 2>/dev/null || true
          git add dashboard_history.json 2>/dev/null || true
          git add gp_debug.json 2>/dev/null || true
          git add asc_debug.json 2>/dev/null || true
          # Only commit if something actually changed
          git diff --staged --quiet || git commit -m "chore: update dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
